name: Lint

on:
  push:
    branches: ['main', 'master']
  pull_request:
    branches: ['main', 'master']

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm ci
          else
            echo "No package.json found — skipping dependency install."
          fi

      - name: Run ESLint (JavaScript)
        run: |
          if git ls-files '*.js' | grep -q .; then
            echo "=== ESLint: Start ==="
            npx eslint --ext .js . 2>&1 | tee eslint-output.txt
            rc=${PIPESTATUS[0]}
            echo "=== ESLint: Exit code $rc ==="
            exit $rc
          else
            echo "No JS files found; skipping ESLint."
          fi

      - name: Run Stylelint (CSS)
        run: |
          if git ls-files '*.css' | grep -q .; then
            echo "=== Stylelint: Start ==="
            npx stylelint "**/*.css" 2>&1 | tee stylelint-output.txt
            rc=${PIPESTATUS[0]}
            echo "=== Stylelint: Exit code $rc ==="
            exit $rc
          else
            echo "No CSS files found; skipping Stylelint."
          fi

      - name: Run HTML validation
        run: |
          if git ls-files '*.html' | grep -q .; then
            echo "=== html-validate: Start ==="
            npx html-validate "**/*.html" 2>&1 | tee htmlvalidate-output.txt
            rc=${PIPESTATUS[0]}
            echo "=== html-validate: Exit code $rc ==="
            exit $rc
          else
            echo "No HTML files found; skipping HTML validation."
          fi
